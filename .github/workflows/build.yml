name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure & Build
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-windows-x64
          path: |
            build-windows/krkr_sync_server.exe
            build-windows/krkr_sync_client.exe

  build-ios:
    name: iOS arm64
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS Device
        run: |
          mkdir -p build-ios-device
          cd build-ios-device
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Build for iOS Simulator
        run: |
          mkdir -p build-ios-sim
          cd build-ios-sim
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Create XCFramework
        run: |
          DEVICE_LIB=$(find build-ios-device -name "libkrkr_sync_lib.a" | head -1)
          SIM_LIB=$(find build-ios-sim -name "libkrkr_sync_lib.a" | head -1)
          
          echo "Device lib: $DEVICE_LIB"
          echo "Sim lib: $SIM_LIB"
          
          xcodebuild -create-xcframework \
            -library "$DEVICE_LIB" \
            -library "$SIM_LIB" \
            -headers include \
            -output krkr_sync.xcframework

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-ios-arm64
          path: krkr_sync.xcframework

  release:
    name: Release
    needs: [build-windows, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          zip -r krkr_sync-windows-x64.zip krkr_sync-windows-x64/
          zip -r krkr_sync-ios-arm64.zip krkr_sync-ios-arm64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: KRKR Sync v${{ github.run_number }}
          body: |
            ## Downloads
            
            - **krkr_sync-windows-x64.zip**: Windows x64 (Server + Client)
            - **krkr_sync-ios-arm64.zip**: iOS arm64 (XCFramework)
          files: |
            krkr_sync-windows-x64.zip
            krkr_sync-ios-arm64.zip

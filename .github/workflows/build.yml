name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build-windows
          cmake --build . --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-windows-x64
          path: |
            build-windows/Release/krkr_sync_server.exe
            build-windows/Release/krkr_sync_client.exe

  build-ios:
    name: iOS arm64
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          mkdir -p build-ios
          cd build-ios
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/ios.toolchain.cmake \
            -DPLATFORM=OS64 \
            -DDEPLOYMENT_TARGET=14.0 \
            -DARCHS="arm64" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Package XCFramework
        run: |
          cd build-ios
          
          # Build for device
          xcodebuild -project krkr_sync.xcodeproj \
            -scheme krkr_sync_lib \
            -sdk iphoneos \
            -configuration Release \
            BUILD_DIR=$(pwd)/device \
            clean build
          
          # Build for simulator (optional)
          xcodebuild -project krkr_sync.xcodeproj \
            -scheme krkr_sync_lib \
            -sdk iphonesimulator \
            -configuration Release \
            BUILD_DIR=$(pwd)/simulator \
            clean build
          
          # Find the static libraries
          DEVICE_LIB=$(find device -name "libkrkr_sync_lib.a" | head -1)
          SIM_LIB=$(find simulator -name "libkrkr_sync_lib.a" | head -1)
          
          # Create XCFramework
          xcodebuild -create-xcframework \
            -library "$DEVICE_LIB" \
            -library "$SIM_LIB" \
            -headers ../include \
            -output ../krkr_sync.xcframework

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-ios-arm64
          path: krkr_sync.xcframework

  release:
    name: Release
    needs: [build-windows, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          zip -r krkr_sync-windows-x64.zip krkr_sync-windows-x64/
          zip -r krkr_sync-ios-arm64.zip krkr_sync-ios-arm64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: KRKR Sync v${{ github.run_number }}
          body: |
            ## Downloads
            
            - **krkr_sync-windows-x64.zip**: Windows x64 (Server + Client)
            - **krkr_sync-ios-arm64.zip**: iOS arm64 (XCFramework)
            
            ## Windows Usage
            
            ```bash
            # Start server on Windows
            krkr_sync_server.exe --folder "U:\Games" --port 29526
            
            # Start client
            krkr_sync_client.exe --folder "C:\Saves" --deepseek-key "sk-xxx"
            ```
            
            ## iOS Integration
            
            1. Add `krkr_sync.xcframework` to your Xcode project
            2. Link against `krkr_sync_lib`
            3. Import `<krkr_sync/protocol.h>`
            
            ## Game Identification
            
            ```bash
            krkr_sync_client.exe --folder "U:\Games" --identify "FateStayNight" --deepseek-key "sk-xxx"
            ```
          files: |
            krkr_sync-windows-x64.zip
            krkr_sync-ios-arm64.zip

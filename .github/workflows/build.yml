name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure & Build
        run: |
          mkdir build-windows
          cd build-windows
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-windows-x64
          path: |
            build-windows/krkr_sync_server.exe
            build-windows/krkr_sync_client.exe

  build-ios:
    name: iOS arm64
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build for iOS Device
        run: |
          mkdir -p build-ios-device
          cd build-ios-device
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Build for iOS Simulator
        run: |
          mkdir -p build-ios-sim
          cd build-ios-sim
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Create XCFramework
        run: |
          DEVICE_LIB=$(find build-ios-device -name "libkrkr_sync_lib.a" | head -1)
          SIM_LIB=$(find build-ios-sim -name "libkrkr_sync_lib.a" | head -1)
          
          echo "Device lib: $DEVICE_LIB"
          echo "Sim lib: $SIM_LIB"
          
          xcodebuild -create-xcframework \
            -library "$DEVICE_LIB" \
            -library "$SIM_LIB" \
            -headers include \
            -output krkr_sync.xcframework

      - name: Package unsigned IPA
        run: |
          APP_NAME="KRKRSync"
          
          # Create .app bundle structure
          mkdir -p "${APP_NAME}.app"
          
          # Copy XCFramework into the app bundle
          cp -R krkr_sync.xcframework "${APP_NAME}.app/"
          
          # Create a minimal main.m
          cat > main.m << 'MAINEOF'
          #import <Foundation/Foundation.h>
          #import <dlfcn.h>
          
          int main(int argc, char *argv[]) {
              @autoreleasepool {
                  NSLog(@"KRKR Sync iOS starting...");
                  NSLog(@"Library loaded successfully");
                  NSLog(@"Frameworks: Foundation, Security, CoreFoundation");
                  
                  // Keep running
                  [[NSRunLoop currentRunLoop] run];
              }
              return 0;
          }
          MAINEOF
          
          # Compile minimal executable
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -framework Foundation \
            main.m -o "${APP_NAME}.app/${APP_NAME}"
          
          # Create Info.plist
          cat > "${APP_NAME}.app/Info.plist" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>KRKR Sync</string>
              <key>CFBundleDisplayName</key>
              <string>KRKR Sync</string>
              <key>CFBundleIdentifier</key>
              <string>com.krkr.sync</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>KRKRSync</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
          </dict>
          </plist>
          PLISTEOF
          
          # Create Payload directory and move app into it
          mkdir -p Payload
          mv "${APP_NAME}.app" Payload/
          
          # Create unsigned IPA (zip)
          zip -r "${APP_NAME}-unsigned.ipa" Payload/
          
          echo "Created: ${APP_NAME}-unsigned.ipa"
          ls -la "${APP_NAME}-unsigned.ipa"

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-ios-arm64
          path: krkr_sync.xcframework

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: krkr_sync-ios-unsigned-ipa
          path: KRKRSync-unsigned.ipa

  release:
    name: Release
    needs: [build-windows, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          zip -r krkr_sync-windows-x64.zip krkr_sync-windows-x64/
          # krkr_sync-ios-arm64 is already an XCFramework, zip it
          cd krkr_sync-ios-arm64 && zip -r ../krkr_sync-ios-arm64.zip . && cd ..
          # IPA is already zipped, just rename
          cp krkr_sync-ios-unsigned-ipa/KRKRSync-unsigned.ipa .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: KRKR Sync v${{ github.run_number }}
          body: |
            ## Downloads
            
            - **krkr_sync-windows-x64.zip**: Windows x64 (Server + Client executables)
            - **krkr_sync-ios-arm64.zip**: iOS XCFramework (for developers)
            - **KRKRSync-unsigned.ipa**: Unsigned iOS app (install via AltStore/Sideloadly/jailbreak)
          files: |
            krkr_sync-windows-x64.zip
            krkr_sync-ios-arm64.zip
            KRKRSync-unsigned.ipa
